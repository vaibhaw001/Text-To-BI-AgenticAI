services:
  - type: web
    name: text-to-bi-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama3-70b-8192
